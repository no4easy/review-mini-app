<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отзывник</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #ffffff);
            min-height: 100vh;
            padding: 16px;
        }

        .header {
            text-align: center;
            padding: 20px 0 24px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.6;
        }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: none;
            background: var(--tg-theme-secondary-bg-color, #16213e);
            color: var(--tg-theme-text-color, #ffffff);
            font-size: 16px;
            outline: none;
        }

        .search-box input::placeholder { opacity: 0.5; }

        .search-box button {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            background: var(--tg-theme-button-color, #6c5ce7);
            color: var(--tg-theme-button-text-color, #ffffff);
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
        }

        .profile-card {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            display: none;
        }

        .profile-card.visible { display: block; }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--tg-theme-button-color, #6c5ce7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .profile-info h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stats {
            display: flex;
            gap: 16px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--tg-theme-button-color, #6c5ce7);
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.6;
        }

        .stars {
            color: #ffd700;
            font-size: 16px;
            margin-bottom: 2px;
        }

        .reviews-list { display: flex; flex-direction: column; gap: 12px; }

        .review-card {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 14px;
            padding: 16px;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .review-author {
            font-weight: 600;
            font-size: 14px;
            color: var(--tg-theme-button-color, #6c5ce7);
        }

        .review-date {
            font-size: 12px;
            opacity: 0.5;
        }

        .review-stars { color: #ffd700; font-size: 14px; margin-bottom: 8px; }

        .review-text {
            font-size: 14px;
            line-height: 1.5;
            opacity: 0.9;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.5;
            display: none;
        }

        .empty-state.visible { display: block; }
        .empty-state div { font-size: 48px; margin-bottom: 12px; }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.visible { display: block; }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--tg-theme-button-color, #6c5ce7);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">
    <h1>📋 Отзывник</h1>
    <p>Поиск отзывов по юзернейму</p>
</div>

<div class="search-box">
    <input type="text" id="usernameInput" placeholder="Введите юзернейм..." />
    <button onclick="search()">🔍</button>
</div>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Загрузка...</p>
</div>

<div class="profile-card" id="profileCard">
    <div class="profile-header">
        <div class="avatar" id="avatar">?</div>
        <div class="profile-info">
            <h2 id="profileName">@username</h2>
            <div class="stars" id="profileStars">☆☆☆☆☆</div>
        </div>
    </div>
    <div class="stats">
        <div class="stat">
            <div class="stat-value" id="totalReviews">0</div>
            <div class="stat-label">отзывов</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="avgRating">0</div>
            <div class="stat-label">средняя оценка</div>
        </div>
    </div>
</div>

<div class="reviews-list" id="reviewsList"></div>

<div class="empty-state" id="emptyState">
    <div>😶</div>
    <p>Отзывов не найдено</p>
</div>

<script>
    const API = 'https://worker-production-acec.up.railway.app';

    if (window.Telegram?.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }

    const input = document.getElementById('usernameInput');
    input.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

    function stars(rating) {
        return '⭐'.repeat(rating) + '☆'.repeat(5 - rating);
    }

    async function search() {
        const username = input.value.trim().replace('@', '');
        if (!username) return;

        document.getElementById('loading').classList.add('visible');
        document.getElementById('profileCard').classList.remove('visible');
        document.getElementById('emptyState').classList.remove('visible');
        document.getElementById('reviewsList').innerHTML = '';

        try {
            const res = await fetch(`${API}/reviews/${username}`);
            const data = await res.json();

            document.getElementById('loading').classList.remove('visible');

            if (!data.reviews || data.reviews.length === 0) {
                document.getElementById('emptyState').classList.add('visible');
                return;
            }

            // Profile card
            document.getElementById('avatar').textContent = username[0].toUpperCase();
            document.getElementById('profileName').textContent = '@' + username;
            document.getElementById('profileStars').textContent = stars(Math.round(data.avg_rating));
            document.getElementById('totalReviews').textContent = data.total;
            document.getElementById('avgRating').textContent = data.avg_rating;
            document.getElementById('profileCard').classList.add('visible');

            // Reviews
            const list = document.getElementById('reviewsList');
            data.reviews.forEach(r => {
                const card = document.createElement('div');
                card.className = 'review-card';
                card.innerHTML = `
                    <div class="review-header">
                        <span class="review-author">@${r.author}</span>
                        <span class="review-date">${r.date}</span>
                    </div>
                    <div class="review-stars">${stars(r.rating)}</div>
                    <div class="review-text">${r.text}</div>
                `;
                list.appendChild(card);
            });

        } catch (e) {
            document.getElementById('loading').classList.remove('visible');
            document.getElementById('emptyState').classList.add('visible');
        }
    }
</script>
</body>
</html>
